name: "Pi Agent"
description: "AI coding agent with Home Assistant integration, accessible from the HA web UI."
version: "0.3.3"
slug: "pi-agent"
image: "ghcr.io/elboletaire/ha-pi/{arch}"
init: false
homeassistant_api: true
ingress: true
ingress_port: 3000
panel_icon: mdi:robot
panel_title: "Pi Agent"
arch:
  - aarch64
  - amd64
map:
  - data:rw
  - config:rw
options:
  log_level: "info"
  # Freeform AGENTS.md text appended to the built-in base instructions.
  # The add-on UI shows a label and helper text for this field.
  agents_md_append: ""
  # Telegram Bot configuration (optional)
  telegram_enabled: false
  telegram_bot_token: ""
  telegram_allowed_chat_ids: "" # Comma-separated list of chat IDs (required if enabled)
schema:
  log_level: list(debug|info|warn|error)
  agents_md_append: str?
  telegram_enabled: "<icon>mdi:telegram; label: Enable Telegram Bot; type: boolean"
  telegram_bot_token: "<icon>mdi:key-variant; label: Telegram Bot Token; type: password; helper_text: Get this from @BotFather on Telegram"
  telegram_allowed_chat_ids: "<icon>mdi:account-group; label: Allowed Chat IDs (comma-separated); type: text; helper_text: Send /start to your bot and then to @userinfobot to get your chat ID. Example: 123456789,-1001234567890"
