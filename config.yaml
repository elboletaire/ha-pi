name: "Pi Agent"
description: "AI coding agent with Home Assistant integration, accessible from the HA web UI."
version: "0.1.3"
slug: "pi-agent"
image: "ghcr.io/elboletaire/ha-pi/{arch}"
init: false
homeassistant_api: true
ingress: true
ingress_port: 3000
panel_icon: mdi:robot
panel_title: "Pi Agent"
arch:
  - aarch64
  - amd64
map:
  - data:rw
options:
  anthropic_api_key: ""
  openai_api_key: ""
  google_api_key: ""
  provider: "anthropic"
  model: "claude-sonnet-4-5-20250929"
  log_level: "info"
  agents_md_append: ""
schema:
  anthropic_api_key: password?
  openai_api_key: password?
  google_api_key: password?
  provider: str
  model: str
  log_level: list(debug|info|warn|error)
  agents_md_append: str?
